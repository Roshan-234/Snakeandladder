<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0618">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snake & Ladder — Online Multiplayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Fira+Code:wght@400;700&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;color:#fff;background:radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,#0a0618 40%,#060612 100%);min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top,8px) 10px env(safe-area-inset-bottom,8px)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes borderGlow{0%,100%{border-color:rgba(255,215,0,.15)}50%{border-color:rgba(255,215,0,.45)}}
@keyframes chaosFlash{0%,100%{background-color:rgba(213,0,249,.08)}50%{background-color:rgba(213,0,249,.22)}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
input:focus{border-color:rgba(255,215,0,.5)!important;outline:none;box-shadow:0 0 12px rgba(255,215,0,.15)}
button{font-family:'Nunito',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;cursor:pointer}
button:active{transform:scale(.97)}
.page{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px}
.card{background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));backdrop-filter:blur(20px);border-radius:min(6vw,24px);padding:min(8vw,40px) min(6vw,32px);max-width:420px;width:100%;border:1px solid rgba(255,215,0,.1);box-shadow:0 30px 90px rgba(0,0,0,.7)}
.title{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:min(7vw,28px);background:linear-gradient(135deg,#FFD700,#FF9F0A,#FFD700);background-size:400% 100%;animation:shimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.inp{width:100%;padding:min(3vw,13px) min(4vw,18px);border-radius:min(3vw,12px);border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:min(4vw,15px);font-family:'Nunito',sans-serif;outline:none}
.btn-a{padding:min(3.5vw,14px) min(5vw,22px);border-radius:min(3.5vw,14px);border:none;font-size:min(4vw,15px);font-weight:800;background:linear-gradient(135deg,#FFD700,#FF9F0A);color:#1a0a2e;box-shadow:0 4px 24px rgba(255,215,0,.35)}
.btn-b{padding:min(3.5vw,14px) min(5vw,22px);border-radius:min(3.5vw,14px);border:1.5px solid rgba(255,255,255,.12);font-size:min(4vw,15px);font-weight:800;background:rgba(255,255,255,.06);color:#fff}
.board{position:relative;border-radius:min(2.5vw,10px);overflow:hidden;transition:border-color .5s}
.token{position:absolute;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-weight:900;z-index:15;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.token.bounce{transform:scale(1.3)!important}
.dice-scene{perspective:350px;cursor:pointer;flex-shrink:0}
.dice-scene.off{opacity:.3;cursor:not-allowed}
.dice-cube{position:relative;transform-style:preserve-3d;transition:transform 1.1s cubic-bezier(.22,1,.36,1)}
.dice-cube.spin{transition:none}
.dface{position:absolute;width:100%;height:100%;background:linear-gradient(145deg,#fffdf7,#e8e0d0);border-radius:16%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
.dface svg circle{fill:#2c1810}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════ CONFIG ═══════ */
const BS=10,TOTAL=100;
const SS={16:6,47:26,49:11,56:53,62:19,64:60,87:24,93:73,95:75,98:78};
const LD={1:38,4:14,9:31,21:42,28:84,36:44,51:67,71:91,80:100};
const COL=[{bg:'#FF2D55',glow:'#ff5c7f',light:'#ffb8c9'},{bg:'#30D158',glow:'#5ddf7a',light:'#a8f0b8'},{bg:'#FF9F0A',glow:'#ffb840',light:'#ffd88a'},{bg:'#0A84FF',glow:'#4da3ff',light:'#a0ccff'}];
const TK=['\u265B','\u265E','\u265C','\u265D'];
const DOTS=[null,[[50,50]],[[28,28],[72,72]],[[28,28],[50,50],[72,72]],[[28,28],[72,28],[28,72],[72,72]],[[28,28],[72,28],[50,50],[28,72],[72,72]],[[28,28],[72,28],[28,50],[72,50],[28,72],[72,72]]];
const TROT=[null,[0,0],[0,180],[0,90],[0,-90],[-90,0],[90,0]];

/* ═══════ STATE ═══════ */
let socket,state=null,scr='menu',myName='',roomCode='',joinCode='',err='',rolling=false,animating=false,diceVal=1,msg='',chaosMsg='',cs=52;
const particles=[],springs=Array.from({length:4},()=>({x:{pos:0,vel:0,target:0,settled:true},y:{pos:0,vel:0,target:0,settled:true}}));
const tpos=[{x:-99,y:-99},{x:-99,y:-99},{x:-99,y:-99},{x:-99,y:-99}];
const tbounce=[false,false,false,false];
const prevPos=[0,0,0,0];

/* ═══════ MATH ═══════ */
function rc(p){const i=p-1,r=Math.floor(i/BS);return{row:BS-1-r,col:r%2===0?i%BS:BS-1-i%BS}}
function ccc(p){const{row,col}=rc(p);return{x:col*cs+cs/2,y:row*cs+cs/2}}
function resize(){cs=Math.floor(Math.min(window.innerWidth-20,560)/BS);render()}
window.addEventListener('resize',resize);

function allSnakes(){const s={...SS};if(state?.chaos)s[state.chaos.head]=state.chaos.tail;return s}
function cellBg(n){
  const{row,col}=rc(n);const e=(row+col)%2===0;
  if(n===100)return'linear-gradient(135deg,#FFD700,#FFA000)';
  if(n===1)return'linear-gradient(135deg,#4FC3F7,#0288D1)';
  if(state?.chaos?.head===n)return e?'linear-gradient(135deg,#4a0040,#8b0060)':'linear-gradient(135deg,#5c0050,#9c0070)';
  if(SS[n])return e?'linear-gradient(135deg,#37071b,#5c1132)':'linear-gradient(135deg,#4a0e25,#6b1a3a)';
  if(LD[n])return e?'linear-gradient(135deg,#073b1b,#115c32)':'linear-gradient(135deg,#0e4a25,#1a6b3a)';
  const b=Math.floor((n-1)/BS)%4;
  return b<2?(e?'linear-gradient(145deg,#1a1040,#1e1248)':'linear-gradient(145deg,#12103a,#161244)'):(e?'linear-gradient(145deg,#0f1a3a,#131e42)':'linear-gradient(145deg,#0a1535,#0e1940)');
}

/* ═══════ SOUND ═══════ */
let ac=null;
function C(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac}
function sfxShake(){const c=C(),b=c.createBuffer(1,c.sampleRate*.05,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.12*(1-i/d.length);const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=3500;s.connect(f).connect(c.destination);s.start()}
function sfxLand(){const c=C(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(150,t+.15);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g).connect(c.destination);o.start(t);o.stop(t+.2)}
function sfxSnake(){const c=C(),t=c.currentTime,b=c.createBuffer(1,c.sampleRate*.6,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++){const p=i/c.sampleRate;d[i]=(Math.random()*2-1)*.2*Math.exp(-p*2.5)+Math.sin(2*Math.PI*(500*Math.exp(-p*6))*p)*.2*Math.exp(-p*3)}const s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(t);[350,330,310,180].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=f;const st=t+.25+i*.18;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.1,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+.16);o.connect(g).connect(c.destination);o.start(st);o.stop(st+.16)})}
function sfxLadder(){const c=C(),t=c.currentTime;[523,659,784,1047,1318].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;const st=t+i*.08;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.18,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+.2);o.connect(g).connect(c.destination);o.start(st);o.stop(st+.2)})}
function sfxMove(){const c=C(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(900,t+.06);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.connect(g).connect(c.destination);o.start(t);o.stop(t+.08)}
function sfxWin(){const c=C(),t=c.currentTime;[523,659,784,1047,784,1047,1318,1568].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type=i%2===0?'square':'triangle';o.frequency.value=f;const st=t+i*.1;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.12,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+.25);o.connect(g).connect(c.destination);o.start(st);o.stop(st+.25)})}
function sfxChaos(){const c=C(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';for(let i=0;i<6;i++){o.frequency.setValueAtTime(400,t+i*.12);o.frequency.linearRampToValueAtTime(800,t+i*.12+.06)}g.gain.setValueAtTime(.08,t);g.gain.setValueAtTime(.08,t+.7);g.gain.exponentialRampToValueAtTime(.001,t+.8);o.connect(g).connect(c.destination);o.start(t);o.stop(t+.8);setTimeout(()=>{const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.setValueAtTime(200,c.currentTime);o2.frequency.exponentialRampToValueAtTime(600,c.currentTime+.15);o2.frequency.exponentialRampToValueAtTime(100,c.currentTime+.3);g2.gain.setValueAtTime(.15,c.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);o2.connect(g2).connect(c.destination);o2.start();o2.stop(c.currentTime+.35)},500)}

/* ═══════ PARTICLES ═══════ */
let pCan,pCtx;
function initP(w,h){pCan=document.getElementById('pcanvas');if(!pCan)return;pCan.width=w;pCan.height=h;pCtx=pCan.getContext('2d')}
function drawP(){if(!pCtx)return;pCtx.clearRect(0,0,pCan.width,pCan.height);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.rot+=p.rs;if(p.life<=0){particles.splice(i,1);continue}pCtx.globalAlpha=Math.max(0,p.life);pCtx.fillStyle=p.color;pCtx.save();pCtx.translate(p.x,p.y);pCtx.rotate(p.rot*Math.PI/180);if(p.shape==='star'){pCtx.beginPath();for(let j=0;j<5;j++){const a=j*4*Math.PI/5-Math.PI/2;pCtx[j===0?'moveTo':'lineTo'](Math.cos(a)*p.size,Math.sin(a)*p.size)}pCtx.closePath();pCtx.fill()}else{pCtx.beginPath();pCtx.arc(0,0,p.size,0,Math.PI*2);pCtx.fill()}pCtx.restore()}pCtx.globalAlpha=1}
function emit(x,y,col,n=20,o={}){for(let i=0;i<n;i++)particles.push({x,y,color:col,vx:(Math.random()-.5)*(o.spread||6),vy:-(Math.random()*(o.up||5)+2),g:o.gravity||.15,life:1,decay:.012+Math.random()*.018,size:o.size||(2+Math.random()*3),shape:o.shape||'circle',rot:Math.random()*360,rs:(Math.random()-.5)*12})}

/* ═══════ SPRING PHYSICS ═══════ */
function springStep(s){const K=140,D=15;s.vel+=(-K*(s.pos-s.target)-D*s.vel)/60;s.pos+=s.vel/60;if(Math.abs(s.pos-s.target)<.4&&Math.abs(s.vel)<.5){s.pos=s.target;s.vel=0;s.settled=true}}
function animTokens(){if(!state||state.phase==='lobby')return;state.players.forEach((p,i)=>{if(!p.pos)return;const same=state.players.filter(pp=>pp.pos===p.pos&&pp.pos>0);const idx=same.indexOf(p);const offs=[{x:0,y:0},{x:cs*.17,y:-cs*.11},{x:-cs*.17,y:cs*.11},{x:cs*.11,y:cs*.15}];const off=same.length>1?(offs[idx]||offs[0]):{x:0,y:0};const{x,y}=ccc(p.pos);const tx=x+off.x,ty=y+off.y;const sp=springs[i];if(!prevPos[i]&&p.pos>0){sp.x.pos=tx;sp.y.pos=ty;sp.x.target=tx;sp.y.target=ty;tpos[i]={x:tx,y:ty};prevPos[i]=p.pos;return}if(prevPos[i]!==p.pos){sp.x.target=tx;sp.x.settled=false;sp.y.target=ty;sp.y.settled=false;tbounce[i]=true;setTimeout(()=>{tbounce[i]=false},500);prevPos[i]=p.pos}springStep(sp.x);springStep(sp.y);tpos[i]={x:sp.x.pos,y:sp.y.pos}})}
function updateTokenDOM(){if(!state)return;state.players.forEach((p,i)=>{const el=document.getElementById(`tok-${i}`);if(!el)return;if(!p.pos){el.style.display='none';return}el.style.display='flex';const sz=cs*.36;el.style.width=sz+'px';el.style.height=sz+'px';el.style.left=(tpos[i].x-sz/2)+'px';el.style.top=(tpos[i].y-sz/2)+'px';el.style.fontSize=(sz*.5)+'px';el.style.background=`radial-gradient(circle at 35% 28%,${COL[i].light},${COL[i].bg})`;el.style.boxShadow=`0 0 ${tbounce[i]?22:8}px ${COL[i].bg}99,0 4px 10px rgba(0,0,0,.5)`;el.style.textShadow='0 1px 3px rgba(0,0,0,.6)';if(tbounce[i])el.classList.add('bounce');else el.classList.remove('bounce')})}

/* ═══════ GAME LOOP ═══════ */
function loop(){animTokens();drawP();updateTokenDOM();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

/* ═══════ DICE ═══════ */
let diceTO;
function animDice(val,cb){rolling=true;render();let step=0;const tick=()=>{step++;sfxShake();const cube=document.querySelector('.dice-cube');if(cube){cube.classList.add('spin');cube.style.transform=`rotateX(${Math.random()*720-360}deg) rotateY(${Math.random()*720-360}deg)`}if(step<14)diceTO=setTimeout(tick,38+step*11);else{const[tx,ty]=TROT[val]||[0,0];if(cube){cube.classList.remove('spin');cube.style.transform=`rotateX(${tx+720}deg) rotateY(${ty+720}deg)`}sfxLand();diceVal=val;setTimeout(()=>{rolling=false;if(cb)cb()},900)}};tick()}

/* ═══════ SOCKET ═══════ */
function connect(){
  socket=io();
  socket.on('state',s=>{state=s;render()});
  socket.on('roll-result',d=>{
    sfxMove();
    if(d.event==='snake'||d.event==='chaos'){setTimeout(()=>{sfxSnake();const c=ccc(d.to);emit(c.x,c.y,d.event==='chaos'?'#d500f9':'#ff1744',35,{spread:10,up:7});msg=d.event==='chaos'?`\uD83D\uDC80 CHAOS SNAKE! Down to ${d.finalTo}!`:`\uD83D\uDC0D Snake! Down to ${d.finalTo}!`;render()},800)}
    else if(d.event==='ladder'){setTimeout(()=>{sfxLadder();const c=ccc(d.to);emit(c.x,c.y,'#00e676',35,{spread:6,up:9,shape:'star'});msg=`\uD83E\uDE9C Ladder! Up to ${d.finalTo}!`;render()},800)}
    if(state?.phase==='finished'){sfxWin();for(let i=0;i<12;i++)setTimeout(()=>emit(Math.random()*cs*BS,Math.random()*cs*BS*.4,['#FFD700','#FF2D55','#30D158','#0A84FF','#FF9F0A','#BF5AF2'][i%6],18,{spread:12,up:10,shape:['star','circle'][i%2]}),i*150)}
  });
  socket.on('chaos-move',d=>{sfxChaos();chaosMsg=`\uD83D\uDC7E Chaos Snake hunts ${d.newChaos.target}! Cell ${d.newChaos.head}!`;if(d.oldChaos){const oc=ccc(d.oldChaos.head);emit(oc.x,oc.y,'#d500f9',25,{spread:8,up:6,shape:'star'})}const nc=ccc(d.newChaos.head);emit(nc.x,nc.y,'#d500f9',30,{spread:10,up:8});render()});
  socket.on('player-left',d=>{msg=`${d.name} left`;render()});
}

/* ═══════ ACTIONS ═══════ */
function createRoom(){myName=document.getElementById('ni')?.value?.trim()||'';if(!myName){err='Enter your name!';render();return}err='';if(!socket)connect();socket.emit('create-room',{name:myName},r=>{if(!r.ok){err=r.error||'Failed';render();return}roomCode=r.code;state=r.state;scr='lobby';render()})}
function joinRoom(){myName=document.getElementById('ni')?.value?.trim()||'';joinCode=document.getElementById('ji')?.value?.trim()?.toUpperCase()||'';if(!myName){err='Enter name!';render();return}if(joinCode.length<4){err='Enter code!';render();return}err='';if(!socket)connect();socket.emit('join-room',{code:joinCode,name:myName},r=>{if(!r.ok){err=r.error||'Failed';render();return}roomCode=r.code;state=r.state;scr='lobby';render()})}
function startGame(){socket.emit('start-game',{code:roomCode},r=>{if(!r.ok){err=r.error||'Failed';render();return}scr='game';msg='';chaosMsg='';render()})}
function roll(){if(rolling||animating||!state||state.phase!=='playing')return;const me=state.players[state.turn];if(!me||me.id!==socket.id)return;animating=true;render();socket.emit('roll-dice',{code:roomCode},r=>{if(!r.ok){animating=false;render();return}animDice(r.roll,()=>{setTimeout(()=>{animating=false;render()},1500)})})}
function again(){socket.emit('play-again',{code:roomCode});msg='';chaosMsg=''}
function leave(){scr='menu';state=null;roomCode='';msg='';err='';chaosMsg='';render()}

/* ═══════ RENDER ═══════ */
function render(){
  const app=document.getElementById('app'),bp=cs*BS;
  if(state?.phase==='playing'&&scr==='lobby')scr='game';

  if(scr==='menu'){app.innerHTML=`<div class="page"><div class="card"><div style="text-align:center;margin-bottom:min(7vw,32px)"><div style="font-size:min(14vw,60px);margin-bottom:8px;animation:bob 2.5s ease-in-out infinite">\uD83C\uDFB2</div><h1 class="title">Snake & Ladder</h1><p style="color:rgba(255,255,255,.3);font-size:min(3.2vw,13px);margin-top:8px">Online Multiplayer \u00B7 Chaos Snake AI \u00B7 Physics</p></div><label style="color:rgba(255,215,0,.6);font-size:min(2.8vw,11px);font-weight:800;display:block;margin-bottom:8px;letter-spacing:1.5px">YOUR NAME</label><input id="ni" class="inp" placeholder="Enter name..." maxlength="16" value="${myName}"><button class="btn-a" style="width:100%;margin-top:min(4vw,18px)" onclick="createRoom()">Create Room</button><div style="text-align:center;margin:min(5vw,22px) 0;border-top:1px solid rgba(255,215,0,.08);position:relative;line-height:0"><span style="background:#0a0618;padding:0 14px;position:relative;top:-1px;font-size:min(2.8vw,11px);font-weight:800;color:rgba(255,215,0,.3);letter-spacing:2px">OR JOIN</span></div><div style="display:flex;gap:8px"><input id="ji" class="inp" placeholder="CODE" maxlength="6" value="${joinCode}" style="flex:1;text-align:center;letter-spacing:min(1.2vw,5px);font-weight:900;font-size:min(5.5vw,22px);font-family:'Fira Code',monospace"><button class="btn-b" style="padding:0 min(6vw,24px)" onclick="joinRoom()">Join</button></div>${err?`<div style="margin-top:14px;padding:10px 16px;border-radius:10px;background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.2);color:#FF2D55;font-size:13px;font-weight:700;text-align:center">${err}</div>`:''}<p style="margin-top:min(5vw,24px);text-align:center;color:rgba(255,255,255,.18);font-size:min(3vw,12px)">Share the room code with friends</p></div></div>`;return}

  if(scr==='lobby'){const h=state?.host===socket?.id,ps=state?.players||[];app.innerHTML=`<div class="page"><div class="card" style="max-width:460px"><h2 style="font-size:min(6vw,24px);font-weight:900;font-family:'Cinzel Decorative',serif;text-align:center;margin-bottom:min(4vw,18px);color:#FFD700">Game Lobby</h2><div style="background:rgba(255,215,0,.06);border:2px dashed rgba(255,215,0,.2);border-radius:16px;padding:min(4vw,16px) min(5vw,22px);text-align:center;margin-bottom:min(5vw,20px);animation:borderGlow 2s ease infinite"><div style="font-size:min(2.5vw,10px);color:rgba(255,255,255,.3);font-weight:800;margin-bottom:4px;letter-spacing:1.5px">SHARE THIS CODE</div><div style="font-size:min(9vw,36px);font-weight:900;letter-spacing:min(2.5vw,10px);font-family:'Fira Code',monospace;color:#FFD700;text-shadow:0 0 24px rgba(255,215,0,.4)">${roomCode}</div></div><div style="font-size:11px;color:rgba(255,255,255,.3);font-weight:800;margin-bottom:10px">PLAYERS (${ps.length}/4)</div>${ps.map((p,i)=>`<div style="display:flex;align-items:center;gap:min(3vw,12px);padding:min(2.5vw,10px) min(3.5vw,14px);border-radius:12px;background:${p.id===socket?.id?COL[i].bg+'18':'rgba(255,255,255,.02)'};border:1.5px solid ${p.id===socket?.id?COL[i].bg+'55':'rgba(255,255,255,.05)'};margin-bottom:6px"><div style="width:min(8vw,34px);height:min(8vw,34px);border-radius:50%;background:radial-gradient(circle at 35% 28%,${COL[i].light},${COL[i].bg});display:flex;align-items:center;justify-content:center;font-size:min(4.5vw,17px);color:#fff;font-weight:900;box-shadow:0 0 12px ${COL[i].bg}66;flex-shrink:0">${TK[i]}</div><div><div style="font-size:min(3.8vw,15px);font-weight:800;color:${COL[i].bg}">${p.name}${p.id===socket?.id?' <span style="opacity:.4;font-size:min(2.5vw,10px)">(you)</span>':''}</div>${p.id===state.host?'<div style="font-size:9px;color:rgba(255,215,0,.5);font-weight:800">HOST</div>':''}</div></div>`).join('')}${Array.from({length:4-ps.length}).map(()=>'<div style="padding:10px 14px;border-radius:12px;margin-bottom:6px;border:1.5px dashed rgba(255,255,255,.05);color:rgba(255,255,255,.1);font-size:12px;text-align:center">Waiting...</div>').join('')}<div style="margin-top:10px;padding:8px 12px;border-radius:8px;background:rgba(213,0,249,.06);border:1px solid rgba(213,0,249,.15);font-size:11px;color:rgba(213,0,249,.7);text-align:center">\uD83D\uDC7E Chaos Snake AI enabled \u2014 hunts the leader!</div>${h?`<button class="btn-a" style="width:100%;margin-top:14px;opacity:${ps.length<2?.4:1}" onclick="startGame()"${ps.length<2?' disabled':''}>Start Game${ps.length<2?' (need 2+)':''}</button>`:'<div style="text-align:center;color:rgba(255,215,0,.4);font-size:13px;padding:16px;animation:glow 2s infinite">Waiting for host...</div>'}${err?`<div style="margin-top:12px;padding:8px 14px;border-radius:8px;background:rgba(255,45,85,.1);color:#FF2D55;font-size:12px;text-align:center">${err}</div>`:''}</div></div>`;return}

  if(!state)return;const cp=state.turn,cpC=COL[cp]||COL[0],isMe=state.players[cp]?.id===socket?.id,fin=state.phase==='finished';
  const dotSvg=n=>(DOTS[n]||[]).map(([cx,cy])=>`<circle cx="${cx}" cy="${cy}" r="9"/>`).join('');
  const half=Math.min(cs*.5,34),dw=Math.min(cs*1.05,84),dcw=Math.min(cs*.85,68);

  // Build board cells
  let cells='';for(let i=1;i<=TOTAL;i++){const{row,col}=rc(i);const isS=!!SS[i],isL=!!LD[i],isCh=state.chaos?.head===i;
    cells+=`<div style="position:absolute;left:${col*cs}px;top:${row*cs}px;width:${cs}px;height:${cs}px;background:${cellBg(i)};border-right:1px solid rgba(255,215,0,.04);border-bottom:1px solid rgba(255,215,0,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;${isCh?'animation:chaosFlash 1.5s infinite':''}"><span style="font-size:${cs*.2}px;font-weight:900;font-family:'Fira Code',monospace;color:${i===100||i===1?'rgba(0,0,0,.7)':isCh?'#d500f9cc':isS?'#ff4466aa':isL?'#44ff88aa':'rgba(255,215,0,.18)'}">${i}</span>${isS?`<span style="font-size:${cs*.17}px;line-height:1;margin-top:-1px">\uD83D\uDC0D</span>`:''}${isL?`<span style="font-size:${cs*.17}px;line-height:1;margin-top:-1px">\uD83E\uDE9C</span>`:''}${isCh?`<span style="font-size:${cs*.17}px;line-height:1;margin-top:-1px">\uD83D\uDC7E</span>`:''}${i===100?`<span style="font-size:${cs*.17}px;line-height:1;margin-top:-1px">\uD83C\uDFC6</span>`:''}${i===1?`<span style="font-size:${cs*.17}px;line-height:1;margin-top:-1px">\uD83D\uDE80</span>`:''}</div>`}

  // SVG overlay
  const snakes=allSnakes();let svg=`<svg width="${bp}" height="${bp}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:3"><defs><filter id="gs"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff1744"/><stop offset="100%" stop-color="#ff6d00"/></linearGradient><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d500f9"/><stop offset="100%" stop-color="#ff1744"/></linearGradient><linearGradient id="lg" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#00e676"/><stop offset="100%" stop-color="#76ff03"/></linearGradient></defs>`;
  Object.entries(snakes).forEach(([h,t])=>{const a=ccc(+h),b=ccc(+t),dx=b.x-a.x,dy=b.y-a.y;const isCh=state.chaos&&+h===state.chaos.head;const g=isCh?'url(#cg)':'url(#sg)';const d=`M${a.x},${a.y} C${a.x+dx*.1-cs*.9},${a.y+dy*.3} ${a.x+dx*.9+cs*.6},${a.y+dy*.7} ${b.x},${b.y}`;svg+=`<g filter="url(#gs)"><path d="${d}" stroke="${g}" stroke-width="${isCh?11:8}" fill="none" opacity="${isCh?.5:.35}" stroke-linecap="round"/><path d="${d}" stroke="${g}" stroke-width="${isCh?5:3.5}" fill="none" opacity="${isCh?.8:.6}" stroke-linecap="round"/><circle cx="${a.x}" cy="${a.y}" r="${isCh?9:7}" fill="${isCh?'#d500f9':'#ff1744'}" opacity=".8">${isCh?'<animate attributeName="r" values="9;12;9" dur="1s" repeatCount="indefinite"/>':''}</circle><circle cx="${a.x-3}" cy="${a.y-3}" r="2" fill="#fff" opacity=".9"/><circle cx="${a.x+3}" cy="${a.y-3}" r="2" fill="#fff" opacity=".9"/></g>`});
  Object.entries(LD).forEach(([b2,t2])=>{const a=ccc(+b2),z=ccc(+t2),dx=z.x-a.x,dy=z.y-a.y,len=Math.sqrt(dx*dx+dy*dy),nx=(-dy/len)*cs*.16,ny=(dx/len)*cs*.16;let rungs='';for(let i=0;i<6;i++){const t3=(i+1)/7,mx=a.x+dx*t3,my=a.y+dy*t3;rungs+=`<line x1="${mx+nx}" y1="${my+ny}" x2="${mx-nx}" y2="${my-ny}" stroke="url(#lg)" stroke-width="2.5" opacity=".35" stroke-linecap="round"/>`}svg+=`<g filter="url(#gs)"><line x1="${a.x+nx}" y1="${a.y+ny}" x2="${z.x+nx}" y2="${z.y+ny}" stroke="url(#lg)" stroke-width="4" opacity=".45" stroke-linecap="round"/><line x1="${a.x-nx}" y1="${a.y-ny}" x2="${z.x-nx}" y2="${z.y-ny}" stroke="url(#lg)" stroke-width="4" opacity=".45" stroke-linecap="round"/>${rungs}</g>`});
  svg+=`</svg>`;

  let tokens='';for(let i=0;i<state.players.length;i++)tokens+=`<div id="tok-${i}" class="token" style="display:none;color:#fff">${TK[i]}</div>`;
  const pills=state.players.map((p,i)=>{const act=i===cp&&!fin,won=fin&&i===state.winner;return`<div style="flex:1;min-width:min(17vw,68px);padding:min(1.5vw,6px) min(2vw,8px);border-radius:min(2.5vw,10px);background:${act?COL[i].bg+'18':won?COL[i].bg+'22':'rgba(255,255,255,.02)'};border:2px solid ${act?COL[i].bg:won?'#FFD700':'transparent'};transition:all .3s"><div style="display:flex;align-items:center;gap:min(1vw,4px)"><span style="font-size:min(3vw,12px)">${TK[i]}</span><span style="font-size:min(2.5vw,10px);font-weight:800;color:${COL[i].bg};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:min(14vw,55px)">${p.name}${p.id===socket?.id?'*':''}</span></div><div style="font-size:min(4vw,16px);font-weight:900;color:#fff;font-family:'Fira Code',monospace">${p.pos===0?'\u2014':p.pos===TOTAL?'\uD83C\uDFC6':p.pos}</div></div>`}).join('');
  const turnMsg=fin?`${state.players[state.winner]?.name} won!`:animating?'Watch the board...':isMe?'Tap dice to roll!':`${state.players[cp]?.name}'s turn...`;

  app.innerHTML=`<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,8px) 10px env(safe-area-inset-bottom,8px);background:radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,#0a0618 40%,#060612 100%)">
    <div style="width:100%;max-width:${bp}px;margin-bottom:min(1.5vw,6px)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:min(1.5vw,6px)">
        <span style="font-size:min(3.5vw,14px);font-weight:900;font-family:'Cinzel Decorative',serif;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.3)">Snake & Ladder</span>
        <div style="display:flex;gap:5px"><span style="padding:3px min(2vw,9px);border-radius:6px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15);font-size:min(2.5vw,10px);font-weight:900;color:#FFD700;font-family:'Fira Code',monospace;letter-spacing:2px">${roomCode}</span><button style="padding:3px min(2vw,9px);border-radius:6px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:rgba(255,255,255,.35);font-size:min(2.5vw,10px);font-weight:700" onclick="leave()">Leave</button></div>
      </div>
      <div style="display:flex;gap:min(1vw,4px);flex-wrap:wrap">${pills}</div>
    </div>
    <div class="board" style="width:${bp}px;height:${bp}px;border:2px solid ${fin?'#FFD70055':cpC.bg+'30'};box-shadow:0 0 80px rgba(0,0,0,.7),0 0 30px ${fin?'#FFD70018':cpC.bg+'0d'},inset 0 0 40px rgba(0,0,0,.3);margin-bottom:min(2vw,8px)">
      ${cells}${svg}${tokens}<canvas id="pcanvas" style="position:absolute;top:0;left:0;pointer-events:none;z-index:30"></canvas>
      ${fin?`<div style="position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .5s ease"><div style="font-size:min(15vw,60px);animation:bob 1s ease-in-out infinite">\uD83C\uDFC6</div><div style="font-size:min(5.5vw,22px);font-weight:900;margin-top:8px;color:${COL[state.winner]?.bg};font-family:'Cinzel Decorative',serif;text-shadow:0 0 30px ${COL[state.winner]?.bg}88">${state.players[state.winner]?.name} Wins!</div>${state.host===socket?.id?'<button class="btn-a" style="margin-top:16px;padding:10px 28px" onclick="again()">Play Again</button>':''}</div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:min(3.5vw,14px);margin-bottom:min(1.5vw,6px);padding:min(2.5vw,10px) min(4vw,16px);border-radius:min(3vw,12px);background:linear-gradient(145deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,215,0,.06);width:100%;max-width:${bp}px">
      <div class="dice-scene ${rolling||animating||!isMe||fin?'off':''}" style="width:${dw}px;height:${dw}px" onclick="roll()">
        <div class="dice-cube" style="width:${dcw}px;height:${dcw}px;margin:${(dw-dcw)/2}px;transform:rotateX(${TROT[diceVal]?.[0]||0}deg) rotateY(${TROT[diceVal]?.[1]||0}deg)">
          <div class="dface" style="transform:rotateY(0deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(1)}</svg></div>
          <div class="dface" style="transform:rotateY(180deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(6)}</svg></div>
          <div class="dface" style="transform:rotateY(-90deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(3)}</svg></div>
          <div class="dface" style="transform:rotateY(90deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(4)}</svg></div>
          <div class="dface" style="transform:rotateX(90deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(5)}</svg></div>
          <div class="dface" style="transform:rotateX(-90deg) translateZ(${half}px)"><svg width="100%" height="100%" viewBox="0 0 100 100">${dotSvg(2)}</svg></div>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:min(2.5vw,10px);font-weight:800;color:${isMe&&!fin&&!animating?'#FFD700':'rgba(255,255,255,.3)'};margin-bottom:3px;letter-spacing:1px">${fin?'GAME OVER':animating?'PLAYING...':isMe?'YOUR TURN':'WAITING'}</div>
        <div style="font-size:min(4vw,16px);font-weight:900;color:${cpC.bg}">${turnMsg}</div>
        ${msg?`<div style="font-size:min(3vw,12px);font-weight:700;color:rgba(255,255,255,.65);margin-top:3px">${msg}</div>`:''}
        ${chaosMsg?`<div style="font-size:min(2.8vw,11px);font-weight:700;color:#d500f9;margin-top:2px;animation:fadeIn .5s ease">${chaosMsg}</div>`:''}
      </div>
    </div>
    ${state.log.length?`<div style="width:100%;max-width:${bp}px;max-height:min(20vw,80px);overflow-y:auto;padding:min(1.5vw,6px) min(2.5vw,10px);border-radius:min(2vw,8px);background:rgba(255,255,255,.015);border:1px solid rgba(255,215,0,.04)">${[...state.log].reverse().slice(0,8).map(l=>`<div style="font-size:min(2.5vw,10px);color:rgba(255,255,255,.3);padding:1.5px 0;font-family:'Fira Code',monospace"><span style="color:${COL[l.p]?.bg}">${state.players[l.p]?.name}</span> \uD83C\uDFB2${l.roll} \u2192 ${l.from}\u2192${l.to}${l.event==='snake'?' \uD83D\uDC0D':''}${l.event==='chaos'?' \uD83D\uDC7E':''}${l.event==='ladder'?' \uD83E\uDE9C':''}${l.event==='overshoot'?' \u270B':''}${l.to===TOTAL?' \uD83C\uDFC6':''}</div>`).join('')}</div>`:''}
  </div>`;
  initP(bp,bp);updateTokenDOM();
}
resize();
</script>
</body>
</html>
